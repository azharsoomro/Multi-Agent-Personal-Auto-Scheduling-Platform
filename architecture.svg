<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 980 720" xmlns="http://www.w3.org/2000/svg"
     font-family="Segoe UI, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="dash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#243044"/>
    </linearGradient>
    <linearGradient id="orch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="mm" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#db2777"/><stop offset="100%" stop-color="#e11d48"/></linearGradient>
    <linearGradient id="ws" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#0891b2"/></linearGradient>
    <linearGradient id="hd" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ea580c"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#065f46"/><stop offset="50%" stop-color="#0e7490"/><stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="980" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="490" y="42" text-anchor="middle" font-size="26" font-weight="800" fill="#e2e8f0">AgentOS Command Center — Architecture</text>
  <text x="490" y="66" text-anchor="middle" font-size="13" fill="#94a3b8">Multi-Agent Auto-Scheduling Platform · 100% local inference</text>

  <!-- Dashboard -->
  <rect x="120" y="92" width="740" height="58" rx="12" fill="url(#dash)" stroke="#334155"/>
  <text x="490" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0">Web Dashboard — http://localhost:8000</text>
  <text x="490" y="138" text-anchor="middle" font-size="11" fill="#94a3b8">Dashboard · Agents · Scheduler · AI-Times · Mailman · Wallstreet · Hacker Digest · Logs</text>

  <!-- WS link -->
  <line x1="490" y1="150" x2="490" y2="178" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="620" y="168" text-anchor="middle" font-size="10" fill="#64748b">FastAPI REST + WebSocket (5s push)</text>

  <!-- Orchestrator -->
  <rect x="120" y="180" width="740" height="96" rx="14" fill="url(#orch)" opacity="0.95"/>
  <text x="490" y="208" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">Main Orchestrator</text>
  <text x="160" y="232" font-size="11.5" fill="#e9e7fb">• CPU / RAM / Disk / Threads — monitored every 5s</text>
  <text x="160" y="250" font-size="11.5" fill="#e9e7fb">• Alarm + corrective action at &gt; 90% · pause at &gt; 85%</text>
  <text x="160" y="268" font-size="11.5" fill="#e9e7fb">• APScheduler cron — editable live</text>
  <text x="560" y="232" font-size="11.5" fill="#e9e7fb">• LLM semaphore — one call at a time (no deadlocks)</text>
  <text x="560" y="250" font-size="11.5" fill="#e9e7fb">• Agent watchdog — crash detection &amp; recovery</text>
  <text x="560" y="268" font-size="11.5" fill="#e9e7fb">• No zombie processes · resource-aware scheduling</text>

  <!-- connectors to agents -->
  <line x1="210" y1="276" x2="210" y2="318" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="276" x2="400" y2="318" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="276" x2="590" y2="318" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="276" x2="780" y2="318" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent cards -->
  <g>
    <rect x="120" y="320" width="180" height="118" rx="12" fill="#0f1b30" stroke="url(#ai)" stroke-width="2"/>
    <text x="210" y="348" text-anchor="middle" font-size="20">📺</text>
    <text x="210" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">Agent-1 · AI-Times</text>
    <text x="210" y="389" text-anchor="middle" font-size="10.5" fill="#94a3b8">5 news + 5 creator</text>
    <text x="210" y="405" text-anchor="middle" font-size="10.5" fill="#94a3b8">videos → email digest</text>
    <text x="210" y="427" text-anchor="middle" font-size="10" fill="#60a5fa">cron 08:00 daily</text>
  </g>
  <g>
    <rect x="310" y="320" width="180" height="118" rx="12" fill="#0f1b30" stroke="url(#mm)" stroke-width="2"/>
    <text x="400" y="348" text-anchor="middle" font-size="20">📬</text>
    <text x="400" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">Agent-2 · Mailman</text>
    <text x="400" y="389" text-anchor="middle" font-size="10.5" fill="#94a3b8">classify · label · star</text>
    <text x="400" y="405" text-anchor="middle" font-size="10.5" fill="#94a3b8">key-people alerts</text>
    <text x="400" y="427" text-anchor="middle" font-size="10" fill="#f472b6">cron */15 min</text>
  </g>
  <g>
    <rect x="500" y="320" width="180" height="118" rx="12" fill="#0f1b30" stroke="url(#ws)" stroke-width="2"/>
    <text x="590" y="348" text-anchor="middle" font-size="20">📈</text>
    <text x="590" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">Agent-3 · Wallstreet</text>
    <text x="590" y="389" text-anchor="middle" font-size="10.5" fill="#94a3b8">25 stocks + metals + FX</text>
    <text x="590" y="405" text-anchor="middle" font-size="10.5" fill="#94a3b8">LLM commentary</text>
    <text x="590" y="427" text-anchor="middle" font-size="10" fill="#34d399">cron 16:30 weekdays</text>
  </g>
  <g>
    <rect x="690" y="320" width="180" height="118" rx="12" fill="#0f1b30" stroke="url(#hd)" stroke-width="2"/>
    <text x="780" y="348" text-anchor="middle" font-size="20">🔥</text>
    <text x="780" y="370" text-anchor="middle" font-size="12.5" font-weight="700" fill="#e2e8f0">Agent-4 · Hacker Digest</text>
    <text x="780" y="389" text-anchor="middle" font-size="10.5" fill="#94a3b8">curate top stories</text>
    <text x="780" y="405" text-anchor="middle" font-size="10.5" fill="#94a3b8">LLM takeaways</text>
    <text x="780" y="427" text-anchor="middle" font-size="10" fill="#fb923c">cron 09:00 daily</text>
  </g>

  <!-- External APIs row -->
  <text x="58" y="488" font-size="11" font-weight="700" fill="#64748b">EXTERNAL</text>
  <text x="58" y="502" font-size="11" font-weight="700" fill="#64748b">APIs</text>
  <g font-size="10.5" fill="#cbd5e1">
    <rect x="120" y="470" width="180" height="32" rx="8" fill="#172033" stroke="#334155"/>
    <text x="210" y="490" text-anchor="middle">YouTube Data API v3</text>
    <rect x="310" y="470" width="180" height="32" rx="8" fill="#172033" stroke="#334155"/>
    <text x="400" y="490" text-anchor="middle">Gmail API · OAuth 2.0</text>
    <rect x="500" y="470" width="180" height="32" rx="8" fill="#172033" stroke="#334155"/>
    <text x="590" y="490" text-anchor="middle">Yahoo Finance</text>
    <rect x="690" y="470" width="180" height="32" rx="8" fill="#172033" stroke="#334155"/>
    <text x="780" y="490" text-anchor="middle">Hacker News API</text>
  </g>
  <line x1="210" y1="438" x2="210" y2="470" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="400" y1="438" x2="400" y2="470" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="590" y1="438" x2="590" y2="470" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="780" y1="438" x2="780" y2="470" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- shared engine connectors -->
  <line x1="210" y1="502" x2="430" y2="560" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.5"/>
  <line x1="400" y1="502" x2="470" y2="560" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.5"/>
  <line x1="590" y1="502" x2="520" y2="560" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.5"/>
  <line x1="780" y1="502" x2="560" y2="560" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.5"/>

  <!-- LLM + DB shared layer -->
  <rect x="200" y="562" width="580" height="110" rx="14" fill="url(#engine)" opacity="0.92"/>
  <text x="490" y="590" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">Shared Local Backend</text>
  <rect x="240" y="606" width="320" height="46" rx="10" fill="#0b3b34" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="627" text-anchor="middle" font-size="13" font-weight="700" fill="#6ee7b7">Ollama — Qwen3 8B</text>
  <text x="400" y="644" text-anchor="middle" font-size="10" fill="#a7f3d0">local inference · no cloud</text>
  <rect x="580" y="606" width="160" height="46" rx="10" fill="#11243f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="660" y="627" text-anchor="middle" font-size="13" font-weight="700" fill="#7dd3fc">SQLite</text>
  <text x="660" y="644" text-anchor="middle" font-size="10" fill="#bae6fd">WAL · persistence</text>

  <text x="490" y="704" text-anchor="middle" font-size="11" fill="#475569">Python 3.12 · FastAPI · APScheduler · SQLAlchemy · WebSocket · plain HTML/JS</text>
</svg>
